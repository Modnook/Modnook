  /{game_slug}/projects/{project_slug}/unfollow:
    put:
      description: |
        Unfollows a specific project by its slug or ID.

        Requires a valid authentication token.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to which the project belongs.
          required: true
