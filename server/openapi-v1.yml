                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified game does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "409":
          description: Conflict. A project with the same slug already exists for this game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Projects

  /{game_slug}/projects/{project_slug}:
    get:
      description: |
        Retrieves the details of a specific project by its slug or ID.

        If the project is private, the currently authenticated user must be a member of the project to access its details or a `Helper`, `Moderator`, or `Admin`. Otherwise, a 403 Forbidden response will be returned.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to which the project belongs.
          required: true
          schema:
            type: string
        - name: project_slug
          in: path
          description: The slug of the project to retrieve.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns the details of the specified project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to access this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified project does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
        - {}
      tags:
        - Projects

    patch:
      description: |
        Updates the details of a specific project by its slug or ID.

        Requires a valid authentication token and the currently authenticated user must be a member of the project with sufficient permissions to update it.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to which the project belongs.
          required: true
          schema:
            type: string
        - name: project_slug
          in: path
          description: The slug of the project to update.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdaterObject"
      responses:
        "200":
          description: Returns the updated project details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedProjectObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to update this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified project does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Projects

    delete:
      description: |
        Deletes a specific project by its slug or ID.

        Requires a valid authentication token and the currently authenticated user must be a member of the project with sufficient permissions to delete it.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to which the project belongs.
          required: true
          schema:
            type: string
        - name: project_slug
          in: path
          description: The slug of the project to delete.
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content. The project has been successfully deleted.
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to delete this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified project does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Projects

  /{game_slug}/projects/{project_slug}/follow:
