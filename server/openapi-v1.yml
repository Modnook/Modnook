openapi: "3.0.3"
info:
  title: Modnook API
  version: "1.0"
servers:
  - url: http://localhost:3000/api/v1

tags:
  - name: Authentication
    description: Endpoints for user authentication and session management.
  - name: Users
    description: Endpoints for managing users and their profiles.
  - name: Games
    description: Endpoints for managing games and their associated data.
  - name: Projects
    description: Endpoints for managing projects and their releases.
  - name: Notifications
    description: Endpoints for managing user notifications.

paths:
  /users/@me:
    get:
      description: |
        Retrieves the currently authenticated user's information. 

        To retrieve another user's information, use the `GET /users/{user_slug}` endpoint.

        Requires a valid authentication token.
      responses:
        "200":
          description: Returns the currently authenticated user's information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserObject"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users

    patch:
      description: |
        Updates the currently authenticated user's information.

        To modify another user's information i.e for administrative purposes, use the `PATCH /users/{user_slug}` endpoint.

        Requires a valid authentication token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdaterObject"
      responses:
        "200":
          description: Returns the updated user's information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users

    delete:
      description: |
        Deletes the currently authenticated user's account. Note this cannot be undone

        Requires a valid authentication token.
      parameters:
        - name: delete_projects
          in: query
          description: If true, all projects owned by the user will also be deleted.
          required: false
          schema:
            type: boolean
      responses:
        "204":
          description: No Content. The user's account has been successfully deleted.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users

  /users/search:
    get:
      description: |
        Searches for users by username or display name. Returns a list of users matching the search query.
      parameters:
        - name: query
          in: query
          description: The search query to find users by username or display name.
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of users to return in the search results.
          required: false
          schema:
            type: integer
            default: 128
        - name: page
          in: query
          description: The number of users to skip before starting to collect the result set.
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Returns a list of users matching the search query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedUserPagingObject"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Users

  /users/logout:
    post:
      description: |
        Logs out the currently authenticated user by invalidating their session token.

        Requires a valid authentication token.
      responses:
        "204":
          description: No Content. The user has been successfully logged out.
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users
        - Authentication

  /users/{user_slug}:
    get:
      description: |
        Retrieves the specified user's information by their slug or user id
      parameters:
        - name: user_slug
          in: path
          description: The slug or user id of the user to retrieve.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns the specified user's information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedUserObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified user does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Users

    patch:
      description: |
        Updates the specified user's information by their slug or user id. 

        Requires a valid authentication token and the actioning user must a `Moderator` or `Admin` role and have higher privileges than the user being updated. For example a `Moderator` cannot update an `Admin` user's information.
      parameters:
        - name: user_slug
          in: path
          description: The slug or user id of the user to update.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdaterObject"
      responses:
        "200":
          description: Returns the updated user's information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedUserObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to update this user's information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified user does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users

    delete:
      description: |
        Deletes the specified user's account by their slug or user id. 

        Requires a valid authentication token and the actioning user must a `Moderator` or `Admin` role and have higher privileges than the user being deleted. For example a `Moderator` cannot delete an `Admin` user's account.
      parameters:
        - name: user_slug
          in: path
          description: The slug or user id of the user to delete.
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content. The user's account has been successfully deleted.
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to delete this user's account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified user does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users

  /users/{user_slug}/projects:
    get:
      description: |
        Retrieves a list of projects owned by the specified user by their slug or user id.
      parameters:
        - name: user_slug
          in: path
          description: The slug or user id of the user whose projects to retrieve.
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of users to return in the search results.
          required: false
          schema:
            type: integer
            default: 128
        - name: page
          in: query
          description: The number of users to skip before starting to collect the result set.
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Returns a list of projects owned by the specified user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedUserPagingObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified user does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Users
        - Projects

  /notifications:
    get:
      description: |
        Retrieves a list of notifications for the currently authenticated user.

        Requires a valid authentication token.
      parameters:
        - name: limit
          in: query
          description: The maximum number of notifications to return in the response.
          required: false
          schema:
            type: integer
            default: 128
        - name: page
          in: query
          description: The number of notifications to skip before starting to collect the result set.
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Returns a list of notifications for the currently authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPagingObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users
        - Notifications

  /notifications/read:
    put:
      description: |
        Marks all notifications for the currently authenticated user as read.

        Requires a valid authentication token.
      responses:
        "204":
          description: No Content. All notifications have been marked as read.
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users
        - Notifications

  /notifications/{notification_id}:
    get:
      description: |
        Retrieves the details of a specific notification for the currently authenticated user.

        Requires a valid authentication token.
      parameters:
        - name: notification_id
          in: path
          description: The unique identifier of the notification to retrieve.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns the details of the specified notification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Not Found. The specified notification does not exist for the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users
        - Notifications

  /notifications/{notification_id}/read:
    put:
      description: |
        Marks a specific notification as read for the currently authenticated user.

        Requires a valid authentication token.
      parameters:
        - name: notification_id
          in: path
          description: The unique identifier of the notification to mark as read.
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content. The notification has been marked as read.
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Not Found. The specified notification does not exist for the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Users
        - Notifications

  /games:
    get:
      description: |
        Retrieves a paginated list of all games available.
      parameters:
        - name: limit
          in: query
          description: The maximum number of games to return in the response.
          required: false
          schema:
            type: integer
            default: 128
        - name: page
          in: query
          description: The number of games to skip before starting to collect the result set.
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Returns a paginated list of all games available.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimplifiedGamePagingObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }

      tags:
        - Games

    post:
      description: |
        Creates a new game. Requires a valid authentication token and the actioning user must have an `Admin` or `Moderator` role.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameBuilderObject"
      responses:
        "201":
          description: Returns the newly created game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedGameObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to create a new game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "409":
          description: Conflict. A game with the same slug already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Games

  /games/{game_slug}:
    get:
      description: |
        Retrieves the details of a specific game by its slug or ID.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to retrieve.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Returns the details of the specified game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified game does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Games

    patch:
      description: |
        Updates the details of a specific game by its slug or ID. 

        Requires a valid authentication token and the actioning user must have an `Admin` or `Moderator` role.
      parameters:
        - name: game_slug
          in: path
          description: The slug or ID of the game to update.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameBuilderObject"
      responses:
        "200":
          description: Returns the updated game details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedGameObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to update this game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified game does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      security:
        - SessionToken: []
      tags:
        - Games

  /games/{game_slug}/project-types:
    get:
      description: |
        Retrieves a list of project types associated with a specific game by its slug or ID.
      parameters:
        - name: game_slug
          in: path
          description: The slug or ID of the game for which to retrieve project types.
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of project types to return in the response.
          required: false
          schema:
            type: integer
            default: 128
        - name: page
          in: query
          description: The number of project types to skip before starting to collect the result set.
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Returns a list of project types associated with the specified game.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTypePagingObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified game does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Games

    patch:
      description: |
        Updates the list of project types associated with a specific game by its slug or ID. 

        Requires a valid authentication token and the actioning user must have an `Admin` or `Moderator` role.
      parameters:
        - name: game_slug
          in: path
          description: The slug or ID of the game for which to update project types.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ProjectTypeObject"
      responses:
        "200":
          description: Returns the updated list of project types associated with the specified game.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectTypePagingObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to update project types for this game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified game does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Games

    post:
      description: |
        Creates a new project type for a specific game by its slug or ID. 

        Requires a valid authentication token and the actioning user must have an `Admin` or `Moderator` role.
      parameters:
        - name: game_slug
          in: path
          description: The slug or ID of the game for which to create a new project type.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTypeBuilderObject"
      responses:
        "201":
          description: Returns the created project type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTypeObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to create project types for this game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "404":
          description: Not Found. The specified game does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "409":
          description: Conflict. A project type with the same slug already exists for this game.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Games

  /{game_slug}/projects:
    get:
      description: |
        Retrieves a paginated list of all projects available.

        Note only active projects will be returned. Projects that have been deleted or are inactive will not be included in the response.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to which the project belongs.
          required: true
          schema:
            type: string
        - name: query
          in: query
          description: A search query to filter projects by name or description.
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: The maximum number of projects to return in the response.
          required: false
          schema:
            type: integer
            default: 128
        - name: page
          in: query
          description: The number of projects to skip before starting to collect the result set.
          required: false
          schema:
            type: integer
            default: 0
        - in: query
          name: filters
          description: A set of filters to apply to the project list. The filters should be provided as key-value pairs, where the key is the filter name and the value is the filter value. For example, to filter projects by type, you could use `filters[project_type]=mod`.
          schema:
            type: object
            additionalProperties:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: Returns a paginated list of all projects available.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimplifiedProjectPagingObject"
        "400":
          description: Bad Request. The request parameters are invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "429": { $ref: "#/components/responses/RateLimitExceeded" }
        "500": { $ref: "#/components/responses/InternalServerError" }
      tags:
        - Projects

    post:
      description: |
        Creates a new project for the specified game.

        Requires a valid authentication token.
      parameters:
        - name: game_slug
          in: path
          description: The slug of the game to which the project belongs.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectBuilderObject"
      responses:
        "201":
          description: Returns the newly created project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimplifiedProjectObject"
        "400":
          description: Bad Request. The request body is invalid or missing required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModnookError"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden. The user does not have permission to create a new project for this game.
          content:
            application/json:
