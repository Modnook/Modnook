components:
  schemas:
    PagingObjectBase:
      type: object
      properties:
        href:
          type: string
          format: uri
          description: The full URL of the current API request that produced this page of results.

        limit:
          type: integer
          minimum: 1
          description: The maximum number of items returned in this response page.

        next:
          type: string
          format: uri
          description: The full URL of the next API request that will produce the next page of results.

        offset:
          type: integer
          minimum: 0
          description: The index of the first item returned in this response page.

        previous:
          type: string
          format: uri
          description: The full URL of the previous API request that produced the previous page of results.

        total:
          type: integer
          description: The total number of items available across all pages.

    UserRole:
      type: string
      enum:
        - User
        - Helper
        - Moderator
        - Admin

    UserUpdaterObject:
      type: object
      properties:
        displayname:
          type: string
        username:
          type: string
        bio:
          type: string
        avatar_url:
          type: string
          format: uri

    SimplifiedUserObject:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        displayname:
          type: string
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SimplifiedUserPagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SimplifiedUserObject"

    UserObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedUserObject"
        - type: object
          properties:
            email:
              type: string
              format: email

    ProjectTypeObject:
      type: object
      properties:
        project_type_id:
          type: string
          format: uuid
        game_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        schema:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      description: A type of project that can be created for a game. For example in the context of minecraft a project could be a Mod, a Resource Pack, Datapack, etc...

    ProjectTypeUpdaterObject:
      type: object
      properties:
        name:
          type: string
        schema:
          type: string

    ProjectTypeBuilderObject:
      type: object
      required:
        - name
        - schema
      properties:
        name:
          type: string
        slug:
          type: string
        schema:
          type: string

    ProjectTypePagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ProjectTypeObject"

    SimplifiedGameObject:
      type: object
      properties:
        game_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        project_count:
          type: integer
        card_url:
          type: string
          format: uri
        banner_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SimplifiedGamePagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SimplifiedGameObject"

    GameObject:
      type: object
      properties:
        game_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        mod_count:
          type: integer
        project_count:
          type: integer
        card_url:
          type: string
          format: uri
        project_types:
          type: array
          items:
            $ref: "#/components/schemas/ProjectTypeObject"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GameUpdaterObject:
      type: object
      properties:
        name:
          type: string
        card_url:
          type: string
          format: uri
        banner_url:
          type: string
          format: uri

    GameBuilderObject:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        slug:
          type: string
        card_url:
          type: string
          format: uri
        banner_url:
          type: string
          format: uri

    SimplifiedOrganizationObject:
      type: object
      properties:
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedOrganizationObject"
        - type: object
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/OrganizationMemberObject"

    OrganizationRole:
      type: string
      enum:
        - Owner
        - Admin
        - Maintainer

    SimplifiedOrganizationMemberObject:
      type: object
      properties:
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/OrganizationRole"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationMemberObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedOrganizationMemberObject"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/SimplifiedUserObject"

    SimplifiedProjectObject:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        game_id:
          type: string
          format: uuid
        project_type_id:
          type: string
          format: uuid
        logo_url:
          type: string
          format: uri
        owner_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        download_count:
          type: integer
        follower_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SimplifiedProjectPagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SimplifiedProjectObject"

    ProjectBuilderObject:
      type: object
      required:
        - name
        - project_type_id
        - logo_url
        - description
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        project_type_id:
          type: string
          format: uuid
        logo_url:
          type: string
          format: uri

    ProjectUpdaterObject:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        project_type_id:
          type: string
          format: uuid
        logo_url:
          type: string
          format: uri

    ProjectObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedProjectObject"
        - type: object
          properties:
            organisations:
              type: array
              items:
                $ref: "#/components/schemas/OrganizationObject"
            members:
              type: array
              items:
                $ref: "#/components/schemas/ProjectMemberObject"

    ProjectPagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ProjectObject"

    SimplifiedReleaseObject:
      type: object
      properties:
        release_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        version:
          type: string
        description:
          type: string
        download_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SimplifiedReleasePagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SimplifiedReleaseObject"

    ReleaseObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedReleaseObject"
        - type: object
          properties:
            project:
              $ref: "#/components/schemas/SimplifiedProjectObject"

    ReleasePagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ReleaseObject"

    ReleaseBuilderObject:
      type: object
      properties:
        version:
          type: string
        description:
          type: string
        download_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    ReleaseUpdaterObject:
      type: object
      properties:
        version:
          type: string
        description:
          type: string
        download_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    ProjectMemberRole:
      type: string
      enum:
        - Owner
        - Admin
        - Maintainer

    SimplifiedProjectMemberObject:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ProjectMemberRole"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMemberObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedProjectMemberObject"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/SimplifiedUserObject"

    ProjectReleaseNotification:
      type: object
      properties:
        release:
          $ref: "#/components/schemas/ReleaseObject"

    ProjectInvitationNotification:
      type: object
      properties:
        data:
          type: object
          properties:
            project:
              $ref: "#/components/schemas/SimplifiedProjectObject"
            inviter:
              $ref: "#/components/schemas/SimplifiedUserObject"

    OrganizationInvitationNotification:
      properties:
        data:
          type: object
          properties:
            organization:
              $ref: "#/components/schemas/SimplifiedOrganizationObject"
            inviter:
              $ref: "#/components/schemas/SimplifiedUserObject"

    NotificationActionObject:
      type: object
      properties:
        action:
          type: string
        url:
          type: string
          format: uri

    NotificationObject:
      type: object
      properties:
        notification_id:
          type: string
          format: uuid
        type:
          type: string
        read:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        actions:
          type: array
          items:
            $ref: "#/components/schemas/NotificationActionObject"
        data:
          oneOf:
            - $ref: "#/components/schemas/ProjectReleaseNotification"
            - $ref: "#/components/schemas/ProjectInvitationNotification"
            - $ref: "#/components/schemas/OrganizationInvitationNotification"
          discriminator:
            propertyName: type
            mapping:
              project.release.v1: "#/components/schemas/ProjectReleaseNotification"
              project.invite.v1: "#/components/schemas/ProjectInvitationNotification"
              organization.invite.v1: "#/components/schemas/OrganizationInvitationNotification"

    NotificationPagingObject:
      allOf:
        - $ref: "#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/NotificationObject"

    ErrorCode:
      type: string
      enum:
        - INVALID_REQUEST
        - UNAUTHORIZED
        - FORBIDDEN
        - MOD_NOT_FOUND
        - VALIDATION_FAILED
        - RATE_LIMITED
        - INTERNAL_ERROR

    ModnookError:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - path
            - trace_id
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
              example: "The requested mod was not found."
            path:
              type: string
              example: "/api/v1/mods/example"
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    example: "mod_slug"
                  issue:
                    type: string
                    example: "Mod slug is invalid."
            trace_id:
              type: string
              example: "trace-123"

  responses:
    Unauthorized:
      description: Unauthorized. The user is not authenticated.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ModnookError"

    RateLimitExceeded:
      description: Too Many Requests. The user has exceeded the rate limit.
      headers:
        Retry-After:
          description: Number of seconds until the client should retry.
          schema:
            type: integer

        RateLimit-Limit:
          description: Maximum number of requests allowed in the current window.
          schema:
            type: integer

        RateLimit-Remaining:
          description: Number of requests remaining in the current window.
          schema:
            type: integer

        RateLimit-Reset:
          description: Time when the rate limit resets as a Unix timestamp.
          schema:
            type: integer

      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ModnookError"

    InternalServerError:
      description: Internal server error. An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ModnookError"

  securitySchemes:
    SessionToken:
      type: apiKey
      in: cookie
      name: modnook_session
    AccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
