  #     tags:
  #       - Projects

components:
  schemas:
    SimplifiedProjectObject:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        game_id:
          type: string
          format: uuid
        project_type_id:
          type: string
          format: uuid
        logo_url:
          type: string
          format: uri
        owner_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        download_count:
          type: integer
        follower_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SimplifiedProjectPagingObject:
      allOf:
        - $ref: "common.yaml#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SimplifiedProjectObject"

    ProjectBuilderObject:
      type: object
      required:
        - name
        - project_type_id
        - logo_url
        - description
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        project_type_id:
          type: string
          format: uuid
        logo_url:
          type: string
          format: uri

    ProjectUpdaterObject:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        project_type_id:
          type: string
          format: uuid
        logo_url:
          type: string
          format: uri

    ProjectObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedProjectObject"
        - type: object
          properties:
            organisations:
              type: array
              items:
                $ref: "organizations.yaml#/components/schemas/OrganizationObject"
            members:
              type: array
              items:
                $ref: "#/components/schemas/ProjectMemberObject"

    ProjectPagingObject:
      allOf:
        - $ref: "common.yaml#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ProjectObject"

    SimplifiedReleaseObject:
      type: object
      properties:
        release_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        version:
          type: string
        description:
          type: string
        download_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SimplifiedReleasePagingObject:
      allOf:
        - $ref: "common.yaml#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/SimplifiedReleaseObject"

    ReleaseObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedReleaseObject"
        - type: object
          properties:
            project:
              $ref: "#/components/schemas/SimplifiedProjectObject"

    ReleasePagingObject:
      allOf:
        - $ref: "common.yaml#/components/schemas/PagingObjectBase"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ReleaseObject"

    ReleaseBuilderObject:
      type: object
      properties:
        version:
          type: string
        description:
          type: string
        download_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    ReleaseUpdaterObject:
      type: object
      properties:
        version:
          type: string
        description:
          type: string
        download_url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    ProjectMemberRole:
      type: string
      enum:
        - Owner
        - Admin
        - Maintainer

    SimplifiedProjectMemberObject:
      type: object
      properties:
        project_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/ProjectMemberRole"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMemberObject:
      allOf:
        - $ref: "#/components/schemas/SimplifiedProjectMemberObject"
        - type: object
          properties:
            user:
              $ref: "users.yaml#/components/schemas/SimplifiedUserObject"

  securitySchemes:
    SessionToken:
      type: apiKey
      in: cookie
      name: modnook_session
    AccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
